<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Premium gradients -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#151b24;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E676;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00C853;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00A142;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="strongGlow">
      <feGaussianBlur stdDeviation="15" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background with gradient -->
  <rect width="1024" height="1024" rx="180" fill="url(#bgGradient)"/>
  
  <!-- Subtle pattern overlay -->
  <circle cx="256" cy="256" r="200" fill="#00E676" opacity="0.02"/>
  <circle cx="768" cy="768" r="200" fill="#00E676" opacity="0.02"/>
  
  <!-- Main Eye Icon -->
  <g transform="translate(512, 512)">
    <!-- Outer glow rings -->
    <circle cx="0" cy="0" r="420" fill="none" stroke="url(#iconGradient)" stroke-width="2" opacity="0.08"/>
    <circle cx="0" cy="0" r="380" fill="none" stroke="url(#iconGradient)" stroke-width="3" opacity="0.12"/>
    <circle cx="0" cy="0" r="340" fill="url(#iconGradient)" opacity="0.05"/>
    
    <!-- Eye shape - premium geometric -->
    <path d="M -300,0 Q 0,-280 300,0 Q 0,280 -300,0 Z" 
          fill="none" 
          stroke="url(#iconGradient)" 
          stroke-width="28" 
          stroke-linecap="round"
          stroke-linejoin="round"
          filter="url(#glow)"/>
    
    <!-- Inner eye detail -->
    <path d="M -240,0 Q 0,-220 240,0 Q 0,220 -240,0 Z" 
          fill="url(#iconGradient)" 
          opacity="0.08"/>
    
    <!-- Iris outer ring with glow -->
    <circle cx="0" cy="0" r="150" 
            fill="none" 
            stroke="url(#iconGradient)" 
            stroke-width="20"
            opacity="0.9"
            filter="url(#glow)"/>
    
    <!-- Iris inner rings -->
    <circle cx="0" cy="0" r="130" 
            fill="none" 
            stroke="url(#iconGradient)" 
            stroke-width="3"
            opacity="0.4"/>
    <circle cx="0" cy="0" r="110" 
            fill="none" 
            stroke="url(#iconGradient)" 
            stroke-width="2"
            opacity="0.3"/>
    
    <!-- Iris gradient fill -->
    <circle cx="0" cy="0" r="125" fill="url(#iconGradient)" opacity="0.15"/>
    
    <!-- Pupil with strong glow -->
    <circle cx="0" cy="0" r="75" fill="#00E676" filter="url(#strongGlow)"/>
    <circle cx="0" cy="0" r="60" fill="#000000" opacity="0.5"/>
    <circle cx="0" cy="0" r="45" fill="#00E676" opacity="0.3"/>
    
    <!-- Focus point (crosshair) - tech detail -->
    <line x1="0" y1="-90" x2="0" y2="90" 
          stroke="#FFFFFF" 
          stroke-width="12" 
          opacity="0.95"
          stroke-linecap="round"/>
    <line x1="-90" y1="0" x2="90" y2="0" 
          stroke="#FFFFFF" 
          stroke-width="12" 
          opacity="0.95"
          stroke-linecap="round"/>
    
    <!-- Scanning ray - signature element -->
    <line x1="0" y1="0" x2="180" y2="-180" 
          stroke="#00E676" 
          stroke-width="18" 
          opacity="1"
          stroke-linecap="round"
          filter="url(#strongGlow)"/>
    <circle cx="180" cy="-180" r="25" fill="#00E676" filter="url(#strongGlow)"/>
    <circle cx="180" cy="-180" r="15" fill="#FFFFFF" opacity="0.8"/>
    
    <!-- Tech corner dots -->
    <circle cx="-220" cy="-220" r="12" fill="#00E676" opacity="0.6"/>
    <circle cx="220" cy="-220" r="12" fill="#00E676" opacity="0.6"/>
    <circle cx="-220" cy="220" r="12" fill="#00E676" opacity="0.6"/>
    <circle cx="220" cy="220" r="12" fill="#00E676" opacity="0.6"/>
    
    <!-- Accent arcs -->
    <path d="M -320,-120 A 340 340 0 0 1 -120,-320" 
          fill="none" 
          stroke="#00E676" 
          stroke-width="4" 
          opacity="0.3"
          stroke-linecap="round"/>
    <path d="M 120,-320 A 340 340 0 0 1 320,-120" 
          fill="none" 
          stroke="#00E676" 
          stroke-width="4" 
          opacity="0.3"
          stroke-linecap="round"/>
  </g>
</svg>