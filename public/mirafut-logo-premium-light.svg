<svg width="500" height="120" viewBox="0 0 500 120" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Premium gradients -->
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E676;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#00C853;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00A142;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0a0e14;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a0e14;stop-opacity:1" />
    </linearGradient>
    
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00E676;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#69F0AE;stop-opacity:1" />
    </linearGradient>
    
    <!-- Glow effect -->
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Shadow -->
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.15"/>
    </filter>
  </defs>
  
  <!-- Premium Eye Icon -->
  <g transform="translate(15, 15)" filter="url(#shadow)">
    <!-- Outer circle with gradient -->
    <circle cx="45" cy="45" r="45" fill="url(#iconGradient)" opacity="0.08"/>
    <circle cx="45" cy="45" r="42" fill="none" stroke="url(#iconGradient)" stroke-width="0.5" opacity="0.2"/>
    
    <!-- Eye shape - modern geometric -->
    <path d="M 15,45 Q 45,15 75,45 Q 45,75 15,45 Z" 
          fill="none" 
          stroke="url(#iconGradient)" 
          stroke-width="3.5" 
          stroke-linecap="round"
          stroke-linejoin="round"
          filter="url(#glow)"/>
    
    <!-- Inner eye detail -->
    <path d="M 22,45 Q 45,22 68,45 Q 45,68 22,45 Z" 
          fill="url(#iconGradient)" 
          opacity="0.1"/>
    
    <!-- Iris outer ring -->
    <circle cx="45" cy="45" r="16" 
            fill="none" 
            stroke="url(#iconGradient)" 
            stroke-width="2.5"
            opacity="0.7"/>
    
    <!-- Iris gradient fill -->
    <circle cx="45" cy="45" r="13.5" fill="url(#iconGradient)" opacity="0.2"/>
    
    <!-- Pupil -->
    <circle cx="45" cy="45" r="8" fill="#00C853" filter="url(#glow)"/>
    <circle cx="45" cy="45" r="5" fill="#1a1a1a" opacity="0.3"/>
    
    <!-- Focus point (crosshair) -->
    <line x1="45" y1="38" x2="45" y2="52" 
          stroke="#FFFFFF" 
          stroke-width="1.5" 
          opacity="0.95"
          stroke-linecap="round"/>
    <line x1="38" y1="45" x2="52" y2="45" 
          stroke="#FFFFFF" 
          stroke-width="1.5" 
          opacity="0.95"
          stroke-linecap="round"/>
    
    <!-- Scanning ray -->
    <line x1="45" y1="45" x2="58" y2="32" 
          stroke="#00E676" 
          stroke-width="2" 
          opacity="1"
          stroke-linecap="round"
          filter="url(#glow)"/>
    <circle cx="58" cy="32" r="3" fill="#00E676" filter="url(#glow)"/>
    
    <!-- Tech dots -->
    <circle cx="28" cy="28" r="1.5" fill="#00C853" opacity="0.5"/>
    <circle cx="62" cy="28" r="1.5" fill="#00C853" opacity="0.5"/>
    <circle cx="28" cy="62" r="1.5" fill="#00C853" opacity="0.5"/>
    <circle cx="62" cy="62" r="1.5" fill="#00C853" opacity="0.5"/>
  </g>
  
  <!-- MIRAFUT Text - Premium Typography -->
  <g transform="translate(120, 0)">
    <!-- Main brand name -->
    <text x="0" y="55" 
          font-family="'Inter', 'SF Pro Display', -apple-system, system-ui, sans-serif" 
          font-size="52" 
          font-weight="900" 
          fill="#0a0e14"
          letter-spacing="-0.01em">
      MiraFut
    </text>
    
    <!-- Accent underline -->
    <rect x="0" y="62" width="80" height="3" fill="url(#accentGradient)" rx="1.5" opacity="0.9"/>
    
    <!-- Tagline - sophisticated -->
    <text x="0" y="85" 
          font-family="'Inter', 'SF Pro Display', -apple-system, system-ui, sans-serif" 
          font-size="13" 
          font-weight="700" 
          fill="#00C853"
          letter-spacing="0.25em"
          opacity="1">
      TALENTO SIN FRONTERAS
    </text>
    
    <!-- Subtle tech accent -->
    <line x1="0" y1="90" x2="220" y2="90" 
          stroke="#00C853" 
          stroke-width="0.5" 
          opacity="0.25"/>
  </g>
  
  <!-- Premium badge -->
  <g transform="translate(420, 20)">
    <rect x="0" y="0" width="70" height="24" rx="12" 
          fill="url(#iconGradient)" 
          opacity="0.1"/>
    <rect x="0.5" y="0.5" width="69" height="23" rx="11.5" 
          fill="none" 
          stroke="url(#iconGradient)" 
          stroke-width="1" 
          opacity="0.3"/>
    <text x="35" y="16" 
          font-family="'Inter', sans-serif" 
          font-size="10" 
          font-weight="700" 
          fill="#00C853"
          text-anchor="middle"
          letter-spacing="0.05em">
      AI POWERED
    </text>
  </g>
</svg>